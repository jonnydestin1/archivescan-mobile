<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ArchiveScan Mobile</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: #eee;
  }

  header {
    padding: 14px;
    text-align: center;
    background: #1d1d1d;
    border-bottom: 1px solid #333;
  }

  header h1 {
    margin: 0;
    font-size: 22px;
  }

  main {
    padding: 12px;
    max-width: 900px;
    margin: auto;
  }

  video, canvas {
    width: 100%;
    max-height: 70vh;
    background: #000;
    border: 1px solid #444;
    border-radius: 10px;
    margin-top: 10px;
  }

  button, input[type="file"] {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
  }

  button {
    background: #4c8bf5;
    color: white;
    cursor: pointer;
  }

  button.secondary {
    background: #333;
  }

  .controls {
    margin-top: 14px;
    padding: 12px;
    background: #1b1b1b;
    border-radius: 10px;
  }

  label {
    display: block;
    margin-top: 12px;
  }

  input[type="range"] {
    width: 100%;
  }

  .small {
    color: #aaa;
    font-size: 13px;
    line-height: 1.4;
  }
</style>
</head>

<body>
<header>
  <h1>ArchiveScan Mobile</h1>
  <div class="small">Negative → Photo</div>
</header>

<main>
  <button onclick="startCamera()">Open Camera</button>
  <button onclick="capturePhoto()">Capture Negative</button>

  <input type="file" accept="image/*" onchange="loadFile(event)" />

  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <div class="controls">
    <button onclick="processImage()">Convert Negative</button>
    <button class="secondary" onclick="resetImage()">Reset</button>
    <button onclick="downloadImage()">Download Photo</button>

    <label>Brightness: <span id="brightnessVal">0</span></label>
    <input id="brightness" type="range" min="-100" max="100" value="0" oninput="updateValues(); processImage();" />

    <label>Contrast: <span id="contrastVal">10</span></label>
    <input id="contrast" type="range" min="-100" max="100" value="10" oninput="updateValues(); processImage();" />

    <label>Saturation: <span id="saturationVal">0</span></label>
    <input id="saturation" type="range" min="-100" max="100" value="0" oninput="updateValues(); processImage();" />

    <label>Warmth / Color Balance: <span id="warmthVal">0</span></label>
    <input id="warmth" type="range" min="-100" max="100" value="0" oninput="updateValues(); processImage();" />
  </div>

  <p class="small">
    Tip: Put the negative in front of an evenly lit white screen or light pad.
    Keep the camera square to the negative and avoid glare.
  </p>
</main>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let originalImageData = null;
let currentImageLoaded = false;

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: "environment",
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      },
      audio: false
    });

    video.srcObject = stream;
  } catch (err) {
    alert("Could not open camera: " + err.message);
  }
}

function capturePhoto() {
  if (!video.videoWidth) {
    alert("Camera not ready yet.");
    return;
  }

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  currentImageLoaded = true;
}

function loadFile(event) {
  const file = event.target.files[0];
  if (!file) return;

  const img = new Image();
  img.onload = function () {
    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img, 0, 0);
    originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    currentImageLoaded = true;
  };

  img.src = URL.createObjectURL(file);
}

function resetImage() {
  if (!originalImageData) return;
  ctx.putImageData(originalImageData, 0, 0);
}

function processImage() {
  if (!currentImageLoaded || !originalImageData) return;

  const brightness = parseInt(document.getElementById("brightness").value);
  const contrast = parseInt(document.getElementById("contrast").value);
  const saturation = parseInt(document.getElementById("saturation").value);
  const warmth = parseInt(document.getElementById("warmth").value);

  const src = new Uint8ClampedArray(originalImageData.data);
  const output = ctx.createImageData(canvas.width, canvas.height);
  const data = output.data;

  let rAvg = 0, gAvg = 0, bAvg = 0;
  const pixelCount = src.length / 4;

  // First pass: invert and estimate color cast
  for (let i = 0; i < src.length; i += 4) {
    const r = 255 - src[i];
    const g = 255 - src[i + 1];
    const b = 255 - src[i + 2];

    rAvg += r;
    gAvg += g;
    bAvg += b;
  }

  rAvg /= pixelCount;
  gAvg /= pixelCount;
  bAvg /= pixelCount;

  const grayAvg = (rAvg + gAvg + bAvg) / 3;

  const rScale = grayAvg / Math.max(rAvg, 1);
  const gScale = grayAvg / Math.max(gAvg, 1);
  const bScale = grayAvg / Math.max(bAvg, 1);

  const contrastFactor = (259 * (contrast + 255)) / (255 * (259 - contrast));

  // Second pass: correction
  for (let i = 0; i < src.length; i += 4) {
    let r = 255 - src[i];
    let g = 255 - src[i + 1];
    let b = 255 - src[i + 2];

    // Orange mask / white balance correction
    r *= rScale;
    g *= gScale;
    b *= bScale;

    // Warmth adjustment
    r += warmth * 0.5;
    b -= warmth * 0.5;

    // Contrast
    r = contrastFactor * (r - 128) + 128;
    g = contrastFactor * (g - 128) + 128;
    b = contrastFactor * (b - 128) + 128;

    // Brightness
    r += brightness;
    g += brightness;
    b += brightness;

    // Saturation
    const gray = 0.299 * r + 0.587 * g + 0.114 * b;
    const satFactor = 1 + saturation / 100;

    r = gray + (r - gray) * satFactor;
    g = gray + (g - gray) * satFactor;
    b = gray + (b - gray) * satFactor;

    data[i] = clamp(r);
    data[i + 1] = clamp(g);
    data[i + 2] = clamp(b);
    data[i + 3] = src[i + 3];
  }

  ctx.putImageData(output, 0, 0);
}

function clamp(value) {
  return Math.max(0, Math.min(255, value));
}

function updateValues() {
  document.getElementById("brightnessVal").textContent =
    document.getElementById("brightness").value;

  document.getElementById("contrastVal").textContent =
    document.getElementById("contrast").value;

  document.getElementById("saturationVal").textContent =
    document.getElementById("saturation").value;

  document.getElementById("warmthVal").textContent =
    document.getElementById("warmth").value;
}

function downloadImage() {
  if (!currentImageLoaded) return;

  const link = document.createElement("a");
  link.download = "archivescan-photo.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}

updateValues();
</script>
</body>
</html>
